  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));gap:6px;max-width:1400px;margin:0 auto}

  .lb{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column}

  .lb-close{position:absolute;top:1rem;right:1.2rem;font-size:2rem;color:#aaa;cursor:pointer;z-index:101;line-height:1}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:2.5rem;color:#aaa;cursor:pointer;user-select:none;padding:0 1rem}
  .lb-nav:hover,.lb-close:hover{color:#fff}
  .lb-prev{left:0}.lb-next{right:0}
  .lb-counter{color:#888;font-size:.8rem;margin-top:.8rem;letter-spacing:.08em}
  .lb-loading{color:#666;font-size:.75rem;margin-top:.4rem}

  @media(max-width:600px){

<div class="lb" id="lightbox">
  <span class="lb-close">&times;</span>
  <span class="lb-nav lb-prev">&#8249;</span>
  <span class="lb-nav lb-next">&#8250;</span>
  <img src="" alt="">
  <div class="lb-counter"></div>
</div>

<script>
(function(){
  var lb=document.getElementById('lightbox');
  var lbImg=lb.querySelector('img');
  var lbCounter=lb.querySelector('.lb-counter');
  var imgs=[],idx=0,fullBase='';

  // Get full-res path from thumb path: replace thumbs/ with nothing
  function fullSrc(thumbSrc){
    return thumbSrc.replace('/thumbs/','/')
  }

  document.querySelectorAll('.grid').forEach(function(g){
    g.querySelectorAll('img').forEach(function(img){
      img.addEventListener('click',function(){
        imgs=[].slice.call(g.querySelectorAll('img'));
        idx=imgs.indexOf(img);
        show();
      });
    });
  });

  function show(){
    lbImg.src=fullSrc(imgs[idx].src);
    lbCounter.textContent=(idx+1)+' / '+imgs.length;
    lb.classList.add('open');
    document.body.style.overflow='hidden';
  }

  lb.querySelector('.lb-close').onclick=closeLb;
  lb.querySelector('.lb-prev').onclick=function(){idx=(idx-1+imgs.length)%imgs.length;show()};
  lb.querySelector('.lb-next').onclick=function(){idx=(idx+1)%imgs.length;show()};
  lb.addEventListener('click',function(e){if(e.target===lb)closeLb()});
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')closeLb();
    if(e.key==='ArrowLeft'){idx=(idx-1+imgs.length)%imgs.length;show()}
    if(e.key==='ArrowRight'){idx=(idx+1)%imgs.length;show()}
  });

  function closeLb(){lb.classList.remove('open');document.body.style.overflow=''}

  var sections=document.querySelectorAll('section');
  var links=document.querySelectorAll('nav a');
  window.addEventListener('scroll',function(){
    var cur='';
    sections.forEach(function(s){if(window.scrollY>=s.offsetTop-120)cur=s.id});
    links.forEach(function(l){l.classList.toggle('active',l.getAttribute('href')==='#'+cur)});
  });
})();
</script>
